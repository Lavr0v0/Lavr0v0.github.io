  let data={};
  try{data=JSON.parse(localStorage.getItem('ocQuizFull'))||{}}catch{}
  allInputs.forEach(input=>{if(input.type==='radio')input.checked=data[input.name]===input.value||(data[input.name]==null&&input.name==='relationMode'&&input.value==='detail');else if(data[input.name]!=null)input.value=data[input.name]});
  syncRelationUI();
  updateProgress();
}
function updateProgress(){let done=0;for(let i=1;i<=96;i++){const x=document.querySelector(`[name=q${i}]:checked`)||document.querySelector(`[name=q${i}]`);if(x&&((x.type==='radio'&&x.checked)||(x.type!=='radio'&&x.value.trim())))done++}document.querySelector('#progressText').textContent=`已填写 ${done} / 96`;document.querySelector('#progressBar').style.width=`${done/96*100}%`}
document.querySelector('main').addEventListener('input',()=>{syncRelationUI();save()});
load();
const titles={A:'二选一速答',B:'性格五维',C:'价值与道德',D:'梦想、恐惧、欲望',E:'习惯与身体',F:'谈吐声线',G:'关系速答',H:'可选简答'};
const dimGroups={开放性:[17,18,19,-20,21,-22],尽责性:[23,24,25,-26,27,-28],外向性:[29,30,31,-32,33,-34],宜人性:[35,36,37,-38,39,-40],情绪稳定性:[41,42,43,-44,-45,46]};
function value(n){const checked=document.querySelector(`[name=q${n}]:checked`);const field=document.querySelector(`[name=q${n}]`);return checked?checked.value:(field?.value.trim()||'')}
function scores(){const out={};for(const [dim,nums] of Object.entries(dimGroups)){let sum=0,complete=true;nums.forEach(n=>{const v=Number(value(Math.abs(n)));if(!v)complete=false;else sum+=n<0?6-v:v});out[dim]=complete?sum:null}return out}
function level(n){return n<=13?'低':n<=22?'中':'高'}
function questionText(n){for(const s of sections){if(s.groups)for(const g of s.groups)for(const q of g[1])if(q[0]===n)return q[1];if(s.questions)for(const q of s.questions)if(q[0]===n)return q[1]}return ''}
function markdown(){
  const me=currentMember()||'未选择成员';
  let md=`# ${me} · OC 性格问卷答案\n\n> 导出时间：${new Date().toLocaleString('zh-CN')}\n\n`;
  for(const s of sections){
    md+=`## ${s.id} · ${titles[s.id]}\n\n`;
    if(s.id==='B'){
      const sc=scores();
      md+='### 五维判读\n\n';
      for(const [name,score] of Object.entries(sc))md+=`- **${name}**：${score==null?'未完成':`${score} / 30（${level(score)}）`}\n`;
      md+='\n';
    }
    if(s.relation){
      if(relationMode()==='summary'){
        md+=`### 关系描述\n\n${document.querySelector('[name="relationSummary"]').value.trim()||'—'}\n\n`;
      }else{
        md+='| 队友 | 一个词形容 | 最欣赏哪点 | 最受不了哪点 | 想单独做的事 |\n|---|---|---|---|---|\n';
        memberNames.forEach((name,i)=>{
          if(name===me)return;
          const cells=[0,1,2,3].map(j=>(document.querySelector(`[name=rel${i}_${j}]`).value.trim()||'—').replace(/\|/g,'\\|'));
          md+=`| ${name} | ${cells.join(' | ')} |\n`;
        });
        md+='\n';
      }
    }
    let questions=[];
    if(s.groups)s.groups.forEach(group=>questions.push(...group[1]));
    if(s.questions)questions.push(...s.questions);
    questions.forEach(q=>{md+=`**${q[0]}. ${q[1]}**  \n${value(q[0])||'—'}\n\n`});
  }
  return md;
}
function showScores(){const sc=scores();const box=document.querySelector('#scoreBox');box.style.display='block';box.innerHTML=`<h3>大五人格得分</h3><div class="score-grid">${Object.entries(sc).map(([k,v])=>`<div class="score-item"><span>${k}</span><b>${v==null?'未完成':`${v} · ${level(v)}`}</b></div>`).join('')}</div>`}
function fileName(){return `${currentMember()||'未命名'}_OC性格问卷答案.md`}
function status(message){const el=document.querySelector('#saveStatus');el.textContent=message;el.classList.add('show');clearTimeout(status.timer);status.timer=setTimeout(()=>el.classList.remove('show'),2400)}

/* 只压缩，不加密：gzip 压缩后转 Base64，体积更小，复制/保存都不需要密码 */
async function gzip(bytes){
  if(!('CompressionStream' in window))return bytes;
  const stream=new Blob([bytes]).stream().pipeThrough(new CompressionStream('gzip'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
function bytesToBase64(bytes){return btoa(Array.from(bytes,b=>String.fromCharCode(b)).join(''))}
async function compressText(text){
  const compressed=await gzip(new TextEncoder().encode(text));
  return `OCQZ1:${bytesToBase64(compressed)}`;
}

async function copyAnswers(){
  try{
    const packed=await compressText(markdown());
    await navigator.clipboard.writeText(packed);
    status('OK啦');
  }catch(error){
    console.error(error);
    status('复制失败，请重试');
  }
}
async function finishAndSave(){
  if(!currentMember()){document.querySelector('#identity').scrollIntoView({behavior:'smooth'});status('请先选择你是谁');return}
  save();showScores();
  const packed=await compressText(markdown());
  const file=new File([packed],fileName().replace(/\.md$/,'.txt'),{type:'text/plain'});
  if(navigator.share&&navigator.canShare?.({files:[file]})){
    try{await navigator.share({title:'OC 性格问卷答案',files:[file]});status('已保存或分享答案');return}catch(error){if(error.name==='AbortError')return}
  }
  const blob=new Blob([packed],{type:'text/plain;charset=utf-8'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);link.download=file.name;link.click();
  setTimeout(()=>URL.revokeObjectURL(link.href),1000);
  status('OK啦');
}
document.querySelector('#copyBtn').addEventListener('click',copyAnswers);
document.querySelector('#downloadBtn').addEventListener('click',finishAndSave);
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源测试页面</title>
    <style>
        @font-face {
            font-family: 'Lorchin';
            src: url('/resources/FONT/LorchinSansP0.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Shanghai Modern';
            src: url('/resources/FONT/上海摩登体.otf') format('opentype');
        }
        @font-face {
            font-family: 'Luperca';
            src: url('/resources/FONT/Luperca-48-72Header.ttf') format('truetype');
        }
        
        body {
            padding: 40px;
            background: #0f172a;
            color: #e2e8f0;
        }
        
        .test-section {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        
        .font-test-zh {
            font-family: 'Lorchin', sans-serif;
            font-size: 24px;
            margin: 10px 0;
        }
        
        .font-test-title-zh {
            font-family: 'Shanghai Modern', serif;
            font-size: 36px;
            margin: 10px 0;
        }
        
        .font-test-en {
            font-family: 'Luperca', serif;
            font-size: 36px;
            margin: 10px 0;
        }
        
        .icon-test {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .icon-item img {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
        }
        
        .status {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            margin: 10px 0;
        }
        
        .success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>
<body>
    <h1>资源加载测试页面</h1>
    
    <div class="test-section">
        <h2>字体测试</h2>
        <div class="font-test-zh">
            这是 Lorchin 字体测试 - 中文正文字体
        </div>
        <div class="font-test-title-zh">
            这是上海摩登体 - 中文标题字体
        </div>
        <div class="font-test-en">
            This is Luperca Font - English Title Font
        </div>
        <div id="font-status"></div>
    </div>
    
    <div class="test-section">
        <h2>图标测试</h2>
        <div class="icon-test">
            <div class="icon-item">
                <img src="/resources/ICON/bookmark.png" alt="bookmark">
                <span>bookmark</span>
            </div>
            <div class="icon-item">
                <img src="/resources/ICON/diskette.png" alt="diskette">
                <span>diskette</span>
            </div>
            <div class="icon-item">
                <img src="/resources/ICON/female.png" alt="female">
                <span>female</span>
            </div>
            <div class="icon-item">
                <img src="/resources/ICON/male-gender.png" alt="male">
                <span>male</span>
            </div>
            <div class="icon-item">
                <img src="/resources/ICON/non-binary.png" alt="non-binary">
                <span>non-binary</span>
            </div>
            <div class="icon-item">
                <img src="/resources/ICON/translation.png" alt="translation">
                <span>translation</span>
            </div>
            <div class="icon-item">
                <img src="/resources/ICON/up-loading.png" alt="up-loading">
                <span>up-loading</span>
            </div>
        </div>
        <div id="icon-status"></div>
    </div>
    
    <script>
        // 检测字体加载
        document.fonts.ready.then(() => {
            const statusEl = document.getElementById('font-status');
            const fonts = ['Lorchin', 'Shanghai Modern', 'Luperca'];
            const loaded = fonts.filter(font => document.fonts.check(`16px "${font}"`));
            
            if (loaded.length === fonts.length) {
                statusEl.innerHTML = '<div class="status success">✓ 所有字体加载成功</div>';
            } else {
                statusEl.innerHTML = `<div class="status error">✗ 部分字体加载失败: ${fonts.filter(f => !loaded.includes(f)).join(', ')}</div>`;
            }
        });
        
        // 检测图标加载
        const icons = document.querySelectorAll('.icon-item img');
        let loadedCount = 0;
        let errorCount = 0;
        
        icons.forEach(img => {
            img.addEventListener('load', () => {
                loadedCount++;
                updateIconStatus();
            });
            img.addEventListener('error', () => {
                errorCount++;
                img.style.border = '2px solid #ef4444';
                updateIconStatus();
            });
        });
        
        function updateIconStatus() {
            if (loadedCount + errorCount === icons.length) {
                const statusEl = document.getElementById('icon-status');
                if (errorCount === 0) {
                    statusEl.innerHTML = '<div class="status success">✓ 所有图标加载成功</div>';
                } else {
                    statusEl.innerHTML = `<div class="status error">✗ ${errorCount} 个图标加载失败</div>`;
                }
            }
        }
    </script>
</body>
</html>

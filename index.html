<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavro.org</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ['"Alibaba PuHuiTi"', 'system-ui', 'sans-serif'],
            mono: ['"Alibaba PuHuiTi"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          }
        }
      }
    </script>
    
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 用于在浏览器中解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050505] overflow-x-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useEffect, useState, useRef } = React;

        // ==========================================
        // 自定义 Hook：滚动视口检测
        // ==========================================
        const useInView = (options) => {
          const ref = useRef(null);
          const [inView, setInView] = useState(false);

          useEffect(() => {
            const currentRef = ref.current;
            if (!currentRef) return;
            const observer = new IntersectionObserver(([entry]) => {
              setInView(entry.isIntersecting);
            }, { threshold: options.threshold || 0 });
            observer.observe(currentRef);
            return () => observer.disconnect();
          }, [options.threshold]);

          return [ref, inView];
        };

        // ==========================================
        // 乱码打字机特效组件 (Cyberpunk Text Scramble)
        // ==========================================
        const ScrambledText = ({ text, phase }) => {
            const [displayText, setDisplayText] = useState(phase === 'start' ? '' : text);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+<>アイウエオカキクケコ';
            
            useEffect(() => {
                if (phase === 'start') {
                    setDisplayText(''); 
                    return;
                }
                if (phase === 'done') {
                    setDisplayText(text);
                    return;
                }
                
                let iteration = 0;
                const maxIterations = 24; 
                
                const interval = setInterval(() => {
                    setDisplayText(text.split('').map((char, index) => {
                        if (index < Math.floor(iteration / (maxIterations / text.length))) {
                            return text[index];
                        }
                        return chars[Math.floor(Math.random() * chars.length)];
                    }).join(''));
                    
                    iteration++;
                    if (iteration >= maxIterations) {
                        clearInterval(interval);
                        setDisplayText(text); 
                    }
                }, 50); 
                
                return () => clearInterval(interval);
            }, [text, phase]);

            return <>{displayText}</>;
        };

        // ==========================================
        // 核心子组件：纪念碑式物理交互链接
        // ==========================================
        const MonumentalLink = ({ title, subtitle, link, copyText, index, color = "white", align = "left", subLinks, iconName, scrollY }) => {
            const [ref, inView] = useInView({ threshold: 0.2 });
            const containerRef = useRef(null);
            const [copied, setCopied] = useState(false);
            
            const [logoStyle, setLogoStyle] = useState({ opacity: 0 });

            useEffect(() => {
                if (!containerRef.current || !iconName) return;
                
                const rect = containerRef.current.getBoundingClientRect();
                const elementCenterY = rect.top + rect.height / 2;
                const screenCenterY = window.innerHeight / 2;
                
                const distance = Math.abs(elementCenterY - screenCenterY);
                const maxDistance = window.innerHeight / 1.2; 
                
                let normalized = Math.max(0, 1 - (distance / maxDistance));
                const curved = Math.pow(normalized, 2);
                
                // 将水印 Logo 的最大透明度锁定在 0.2 (20%)
                const opacity = curved * 0.2; 
                
                setLogoStyle({ opacity });
            }, [scrollY, iconName]);

            const direction = align === 'right' ? 1 : align === 'left' ? -1 : 0;
            const initialTranslateX = direction * 250; 
            const initialTranslateY = align === 'center' ? 100 : 0;
            
            const activeColor = color === 'green' ? 'text-[#00ff66]' : 'text-white';
            const strokeColor = '2px #222';
            const labelColor = 'text-[#00ff66]';

            const flexAlign = align === 'right' ? 'items-end text-right' : align === 'center' ? 'items-center text-center' : 'items-start text-left';
            const innerAlign = align === 'right' ? 'items-end' : align === 'center' ? 'items-center' : 'items-start';
            const subLinkJustify = align === 'right' ? 'justify-end' : align === 'center' ? 'justify-center' : 'justify-start';

            return (
                <div ref={(el) => { ref.current = el; containerRef.current = el; }} className={`flex flex-col ${flexAlign} gap-4 md:gap-6 py-12 px-4 relative z-10 w-full`}>
                    
                    {iconName && (
                        <i className={`${iconName} absolute top-1/2 text-white z-[-2] pointer-events-none`}
                           style={{
                               fontSize: 'min(40vw, 400px)',
                               opacity: logoStyle.opacity,
                               [align === 'right' ? 'right' : align === 'center' ? 'left' : 'left']: align === 'center' ? '50%' : '5%',
                               transform: `translate(${align === 'center' ? '-50%' : '0'}, -50%)`,
                               willChange: 'opacity'
                           }}
                        ></i>
                    )}

                    {copyText ? (
                    <span 
                        onClick={() => {
                            navigator.clipboard.writeText(copyText).then(() => {
                                setCopied(true);
                                setTimeout(() => setCopied(false), 2000);
                            });
                        }}
                        className={`text-[3.5rem] md:text-[6rem] lg:text-[8.5rem] uppercase tracking-tighter leading-[0.8] duration-[800ms] ease-[cubic-bezier(0.16,1,0.3,1)] font-display block relative z-20 cursor-pointer hover:opacity-70 ${inView ? activeColor : 'text-transparent'}`} 
                        style={{ 
                            WebkitTextStroke: inView ? '0px transparent' : strokeColor, 
                            transform: inView ? `translate3d(0, 0, 0)` : `translate3d(${initialTranslateX}px, ${initialTranslateY}px, 0)`,
                            transitionProperty: 'color, -webkit-text-stroke, transform',
                            willChange: 'transform'
                        }}
                    >
                        {title}
                        {copied && <span className="text-[#00ff66] text-sm md:text-base font-mono ml-4 align-middle tracking-widest">COPIED</span>}
                    </span>
                    ) : (
                    <a 
                        href={link} 
                        target={link && (link.startsWith('http') || link.startsWith('mailto')) ? '_blank' : '_self'}
                        rel="noreferrer"
                        className={`text-[3.5rem] md:text-[6rem] lg:text-[8.5rem] uppercase tracking-tighter leading-[0.8] duration-[800ms] ease-[cubic-bezier(0.16,1,0.3,1)] font-display block relative z-20 ${link ? 'cursor-pointer hover:opacity-70' : 'cursor-default'} ${inView ? activeColor : 'text-transparent'}`} 
                        style={{ 
                            WebkitTextStroke: inView ? '0px transparent' : strokeColor, 
                            transform: inView ? `translate3d(0, 0, 0)` : `translate3d(${initialTranslateX}px, ${initialTranslateY}px, 0)`,
                            transitionProperty: 'color, -webkit-text-stroke, transform',
                            willChange: 'transform'
                        }}
                    >
                        {title}
                    </a>
                    )}
                    
                    <div className={`w-full max-w-3xl pt-2 flex flex-col relative z-20 ${innerAlign}`}>
                        <div className={`transition-all duration-1000 ease-out delay-100 ${inView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}>
                            <span className={`font-mono text-sm md:text-base mb-3 block font-bold ${labelColor}`}>{">"} {subtitle.label}</span>
                            <p className="text-base md:text-xl text-gray-400 font-light leading-relaxed">
                                {subtitle.desc}
                            </p>
                            
                            {subLinks && (
                                <div className={`flex flex-wrap items-center gap-6 mt-6 ${subLinkJustify}`}>
                                    {subLinks.map((sl, idx) => (
                                        <a key={idx} href={sl.url} target="_blank" rel="noreferrer" className="text-xs md:text-sm font-mono tracking-widest transition-colors border-b border-transparent pb-1 uppercase text-white hover:border-[#00ff66] hover:text-[#00ff66]">
                                            [ {sl.name} ]
                                        </a>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主应用：Lavro Portfolio
        // ==========================================
        const LavroPortfolio = () => {
          const [scrollY, setScrollY] = useState(0);
          const scrollYRef = useRef(0);
          const lenisRef = useRef(null);
          const rafUpdateRef = useRef(null);
          
          // DOM refs for direct parallax manipulation (避免每帧 setState)
          const heroContentRef = useRef(null);
          const heroFadeRef1 = useRef(null);
          const heroFadeRef2 = useRef(null);
          const heroTitleRef = useRef(null);
          const clipLayerRef = useRef(null);
          const clipBackdropRef = useRef(null);
          const clipLineRef = useRef(null);
          const bgTextRef = useRef(null);
          const aboutParallaxRef = useRef(null);
          const hobbyParallaxRef = useRef(null);

          // 直接操作 DOM style 的视差更新函数
          const updateParallax = (scroll) => {
            const heroTextTranslateY = scroll * 0.25;
            const scrollFadeOpacity = Math.max(0, 1 - scroll / 250);
            const heroTitleScale = 1 + scroll * 0.0004;
            const clipTop = Math.max(0, 55 - scroll * 0.015);
            const clipBottom = Math.max(0, 35 - scroll * 0.02);
            const bgTextTranslateX = scroll * -0.15;
            const contentParallax1 = scroll * -0.015;
            const hobbyParallax = scroll * 0.03;

            if (heroContentRef.current) heroContentRef.current.style.transform = `translate3d(0, ${heroTextTranslateY}px, 0)`;
            if (heroFadeRef1.current) heroFadeRef1.current.style.opacity = scrollFadeOpacity;
            if (heroFadeRef2.current) heroFadeRef2.current.style.opacity = scrollFadeOpacity;
            if (heroTitleRef.current) heroTitleRef.current.style.transform = `scale(${heroTitleScale}) translateZ(0)`;
            if (clipBackdropRef.current) clipBackdropRef.current.style.clipPath = `polygon(${clipTop}% 0, 100% 0, 100% 100%, ${clipBottom}% 100%)`;
            if (clipLineRef.current) {
              clipLineRef.current.setAttribute('x1', `${clipTop}%`);
              clipLineRef.current.setAttribute('x2', `${clipBottom}%`);
            }
            if (bgTextRef.current) bgTextRef.current.style.transform = `translate3d(${bgTextTranslateX}px, 0, 0)`;
            if (aboutParallaxRef.current) aboutParallaxRef.current.style.transform = `translate3d(0, ${contentParallax1}px, 0)`;
            if (hobbyParallaxRef.current) hobbyParallaxRef.current.style.transform = `translate3d(0, ${hobbyParallax}px, 0)`;
            
            // MonumentalLink 的水印 logo 需要 scrollY state，但降频避免过度渲染
            setScrollY(scroll);
          };
          
          const [introPhase, setIntroPhase] = useState('start');
          const [linePhase, setLinePhase] = useState('start');

          const [aboutTitleRef, aboutTitleInView] = useInView({ threshold: 0.2 });
          const [hobbyTitleRef, hobbyTitleInView] = useInView({ threshold: 0.2 });
          const [devTitleRef, devTitleInView] = useInView({ threshold: 0.8 });
          const [designTitleRef, designTitleInView] = useInView({ threshold: 0.8 });
          const [contactTitleRef, contactTitleInView] = useInView({ threshold: 0.8 });

          // 爱好海报图库 - 真实图片
          const gameImages = [
            './HomePageAssets/Games/games-1.png','./HomePageAssets/Games/games-2.png','./HomePageAssets/Games/games-3.jpg','./HomePageAssets/Games/games-4.png',
            './HomePageAssets/Games/games-5.png','./HomePageAssets/Games/games-6.png','./HomePageAssets/Games/games-7.jpg','./HomePageAssets/Games/games-8.png',
            './HomePageAssets/Games/games-9.png','./HomePageAssets/Games/games-10.png','./HomePageAssets/Games/games-11.png','./HomePageAssets/Games/games-12.png',
            './HomePageAssets/Games/games-13.png','./HomePageAssets/Games/games-14.jpg','./HomePageAssets/Games/games-15.jpg','./HomePageAssets/Games/games-16.png',
            './HomePageAssets/Games/games-17.png'
          ];
          const animeImages = [
            './HomePageAssets/Anime/anime-1.jpg','./HomePageAssets/Anime/anime-2.jpg','./HomePageAssets/Anime/anime-3.jpg','./HomePageAssets/Anime/anime-4.jpg',
            './HomePageAssets/Anime/anime-5.jpg','./HomePageAssets/Anime/anime-6.jpg','./HomePageAssets/Anime/anime-7.jpg','./HomePageAssets/Anime/anime-8.jpg',
            './HomePageAssets/Anime/anime-9.jpg','./HomePageAssets/Anime/anime-10.jpg'
          ];

          // 刷新后强制回到顶部
          useEffect(() => {
            window.history.scrollRestoration = 'manual';
            window.scrollTo(0, 0);
          }, []);

          // Lenis 丝滑滚动
          useEffect(() => {
            let lenisInstance;
            let reqId;

            import('https://esm.sh/lenis@1.1.18').then(({ default: Lenis }) => {
              lenisInstance = new Lenis({
                duration: 1.5,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                smoothWheel: true,
                smoothTouch: true,
              });

              // 用 ref 存 scrollY，避免每帧 setState 导致全量重渲染
              lenisInstance.on('scroll', (e) => {
                scrollYRef.current = e.scroll;
                if (!rafUpdateRef.current) {
                  rafUpdateRef.current = requestAnimationFrame(() => {
                    updateParallax(e.scroll);
                    rafUpdateRef.current = null;
                  });
                }
              });

              lenisRef.current = lenisInstance;

              function raf(time) {
                lenisInstance.raf(time);
                reqId = requestAnimationFrame(raf);
              }
              reqId = requestAnimationFrame(raf);
            }).catch(err => console.log("Lenis load failed.", err));

            return () => {
              if (reqId) cancelAnimationFrame(reqId);
              if (lenisInstance) lenisInstance.destroy();
              if (rafUpdateRef.current) cancelAnimationFrame(rafUpdateRef.current);
            };
          }, []);

          useEffect(() => {
            const t1 = setTimeout(() => setIntroPhase('animating'), 10); 
            const t2 = setTimeout(() => setLinePhase('in'), 800); 
            const t3 = setTimeout(() => setIntroPhase('done'), 1500); 
            return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); }
          }, []);

          // 视差值现在由 updateParallax 直接操作 DOM

          return (
            <div className="min-h-screen bg-[#050505] text-[#f0f0f0] overflow-hidden selection:bg-[#00ff66] selection:text-black font-sans">

              {/* 注入全局抗锯齿与底层样式 */}
              <style dangerouslySetInnerHTML={{__html: `
                @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
                
                @font-face {
                    font-family: 'Alibaba PuHuiTi';
                    src: url('./HomePageAssets/AlibabaPuHuiTi-Light.woff2') format('woff2');
                    font-weight: 300;
                    font-style: normal;
                    font-display: swap;
                }

                body {
                    -webkit-font-smoothing: antialiased;
                    -moz-osx-font-smoothing: grayscale;
                    text-rendering: optimizeLegibility;
                    font-family: 'Alibaba PuHuiTi', system-ui, sans-serif;
                }
                
                .font-display { font-family: 'Anton', sans-serif; }
                
                /* snap 由 JS 接管，CSS snap 已移除 */
                
                ::-webkit-scrollbar { width: 8px; }
                ::-webkit-scrollbar-track { background: #050505; }
                ::-webkit-scrollbar-thumb { background: #333; }
                ::-webkit-scrollbar-thumb:hover { background: #00ff66; }

                /* =========================================
                   无限循环倾斜画廊特效 
                   ========================================= */
                @keyframes marquee-x {
                    0% { transform: translateX(0); }
                    100% { transform: translateX(-50%); }
                }
                @keyframes marquee-x-reverse {
                    0% { transform: translateX(-50%); }
                    100% { transform: translateX(0); }
                }
                .animate-marquee {
                    animation: marquee-x 40s linear infinite;
                    display: flex;
                    width: max-content;
                }
                .animate-marquee-reverse {
                    animation: marquee-x-reverse 45s linear infinite;
                    display: flex;
                    width: max-content;
                }

                /* =========================================
                   经典大块切割特效 (开启强制抗锯齿属性)
                   ========================================= */
                .animate-brutal-glitch { 
                    animation: main-flash 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both; 
                    backface-visibility: hidden;
                    transform: translateZ(0);
                }
                .animate-brutal-glitch::before, .animate-brutal-glitch::after {
                    content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; pointer-events: none;
                    backface-visibility: hidden;
                }
                .animate-brutal-glitch::before { left: 3px; text-shadow: -2px 0 #fff; animation: glitch-slice-1 0.2s infinite linear alternate-reverse; }
                .animate-brutal-glitch::after { left: -3px; text-shadow: 2px 0 #00ff66; animation: glitch-slice-2 0.3s infinite linear alternate-reverse; z-index: -1; }

                @keyframes main-flash {
                    0% { opacity: 0; color: #fff; }
                    10% { opacity: 1; color: transparent; -webkit-text-stroke: 3px #fff; }
                    25% { color: #00ff66; -webkit-text-stroke: 0px; }
                    40% { color: transparent; -webkit-text-stroke: 4px #fff; }
                    60% { color: #fff; -webkit-text-stroke: 0px transparent; }
                    80% { color: transparent; -webkit-text-stroke: 1px #00ff66; }
                    100% { color: #fff; }
                }
                
                @keyframes glitch-slice-1 { 0% { clip-path: inset(20% 0 80% 0); transform: translateX(-10px); } 10% { clip-path: inset(60% 0 10% 0); transform: translateX(10px); } 20% { clip-path: inset(40% 0 50% 0); transform: translateX(-10px); } 30% { clip-path: inset(80% 0 5% 0); transform: translateX(10px); } 40% { clip-path: inset(10% 0 70% 0); transform: translateX(-10px); } 50% { clip-path: inset(30% 0 40% 0); transform: translateX(10px); } 60% { clip-path: inset(70% 0 20% 0); transform: translateX(-10px); } 70% { clip-path: inset(5% 0 80% 0); transform: translateX(10px); } 80% { clip-path: inset(50% 0 30% 0); transform: translateX(-10px); } 90% { clip-path: inset(90% 0 5% 0); transform: translateX(10px); } 100% { clip-path: inset(15% 0 60% 0); transform: translateX(-10px); } }
                @keyframes glitch-slice-2 { 0% { clip-path: inset(10% 0 60% 0); transform: translateX(10px); } 10% { clip-path: inset(30% 0 20% 0); transform: translateX(-10px); } 20% { clip-path: inset(70% 0 10% 0); transform: translateX(10px); } 30% { clip-path: inset(20% 0 50% 0); transform: translateX(-10px); } 40% { clip-path: inset(50% 0 30% 0); transform: translateX(10px); } 50% { clip-path: inset(5% 0 80% 0); transform: translateX(-10px); } 60% { clip-path: inset(80% 0 5% 0); transform: translateX(10px); } 70% { clip-path: inset(40% 0 40% 0); transform: translateX(-10px); } 80% { clip-path: inset(60% 0 10% 0); transform: translateX(10px); } 90% { clip-path: inset(20% 0 70% 0); transform: translateX(-10px); } 100% { clip-path: inset(10% 0 50% 0); transform: translateX(10px); } }
              `}} />

              {/* GLOBAL FIXED BACKGROUND - 建议将背景图下载到本地: ./bg.jpg */}
              <div 
                className="fixed inset-0 z-0 bg-cover bg-center grayscale contrast-[1.3] brightness-[0.25] pointer-events-none"
                style={{ backgroundImage: 'url("./HomePageAssets/bg.jpg")' }}
              ></div>
              <div 
                className="fixed inset-0 z-[1] pointer-events-none opacity-[0.05] mix-blend-overlay"
                style={{ backgroundImage: 'url("https://www.transparenttextures.com/patterns/stardust.png")' }}
              ></div>

              <main className="relative z-10 w-full">
                  
                  {/* ==================== 01. HERO SECTION (带强制吸附) ==================== */}
                  <header className="relative w-full h-screen flex items-center justify-center">
                    <div 
                      ref={heroContentRef}
                      className="absolute inset-0 z-20 w-full max-w-[100rem] mx-auto px-6 flex flex-col items-start justify-center"
                      style={{ willChange: 'transform' }}
                    >
                      {/* 将滚动透明度和开场动画分离：外层瞬间响应滚动，内层负责开场延迟 */}
                      <div ref={heroFadeRef1} style={{ willChange: 'opacity' }}>
                          <div style={{
                              opacity: introPhase === 'done' ? 1 : 0,
                              transform: introPhase === 'done' ? 'translateY(0)' : 'translateY(20px)',
                              transition: 'opacity 1s cubic-bezier(0.16,1,0.3,1) 0.1s, transform 1s cubic-bezier(0.16,1,0.3,1) 0.1s'
                          }}>
                              <h2 className="text-[#00ff66] tracking-[0.3em] uppercase text-xs md:text-sm mb-8 font-bold opacity-80 font-mono">
                                LAVRO.ORG // PORTFOLIO
                              </h2>
                          </div>
                      </div>
                      
                      {/* 加入 transform-gpu 提升抗锯齿性能 */}
                      <h1 
                        ref={heroTitleRef}
                        data-text="LAVRO"
                        className={`text-[6rem] sm:text-[10rem] md:text-[14rem] lg:text-[18rem] tracking-tighter uppercase leading-[0.8] text-white font-display transform-gpu relative ${introPhase !== 'done' ? 'animate-brutal-glitch' : ''}`}
                        style={{ transformOrigin: 'left center', willChange: 'transform' }}
                      >
                        <ScrambledText text="LAVRO" phase={introPhase} />
                      </h1>

                      <div ref={heroFadeRef2} className="w-full" style={{ willChange: 'opacity' }}>
                          {/* 简介文本替换并应用 text-gray-200 以完美适配高对比度反相 */}
                          <div style={{
                              opacity: introPhase === 'done' ? 1 : 0,
                              transform: introPhase === 'done' ? 'translateY(0)' : 'translateY(20px)',
                              transition: 'opacity 1s cubic-bezier(0.16,1,0.3,1) 0.3s, transform 1s cubic-bezier(0.16,1,0.3,1) 0.3s'
                          }}>
                              <h2 className="text-base md:text-2xl tracking-[0.5em] md:tracking-[1em] text-gray-200 mt-6 md:mt-8 ml-2 font-light relative z-20">
                                国际学生 / 平面设计 / 创意开发
                              </h2>
                          </div>
                          
                          <div className="w-full max-w-4xl" style={{
                              opacity: introPhase === 'done' ? 1 : 0,
                              transform: introPhase === 'done' ? 'translateY(0)' : 'translateY(20px)',
                              transition: 'opacity 1s cubic-bezier(0.16,1,0.3,1) 0.5s, transform 1s cubic-bezier(0.16,1,0.3,1) 0.5s'
                          }}>
                              <div className="flex flex-wrap gap-x-12 gap-y-6 mt-12 md:mt-16 text-xs md:text-sm tracking-[0.1em] md:tracking-[0.2em] font-mono font-bold text-white relative z-20">
                                  <div className="flex flex-col gap-1">
                                      <span className="text-[#00ff66] text-[10px] md:text-xs opacity-70">MBTI</span>
                                      <span>INTP-A</span>
                                  </div>
                                  <div className="flex flex-col gap-1">
                                      <span className="text-[#00ff66] text-[10px] md:text-xs opacity-70">STATUS</span>
                                      <span>OTAKU</span>
                                  </div>
                                  <div className="flex flex-col gap-1 w-full md:w-auto mt-2 md:mt-0">
                                      <span className="text-[#00ff66] text-[10px] md:text-xs opacity-70">常玩游戏</span>
                                      <span className="tracking-widest">MINECRAFT / VALORANT / APEX / OW</span>
                                  </div>
                              </div>
                          </div>
                      </div>
                    </div>

                    {/* 反相切线层：扫过简介时，text-gray-200 会瞬间反转成极具冲击力的黑色 */}
                    <div 
                        className={`absolute inset-0 z-30 pointer-events-none ${linePhase === 'start' ? 'translate-x-[100vw]' : 'transition-transform duration-[1200ms] ease-[cubic-bezier(0.16,1,0.3,1)] translate-x-0'}`}
                    >
                        <div ref={clipBackdropRef} className="absolute inset-0" style={{ 
                            backdropFilter: 'invert(100%) hue-rotate(180deg)', 
                            WebkitBackdropFilter: 'invert(100%) hue-rotate(180deg)', 
                            clipPath: `polygon(55% 0, 100% 0, 100% 100%, 35% 100%)` 
                        }}></div>
                        <svg className="absolute inset-0 w-full h-full drop-shadow-[0_0_15px_rgba(0,255,102,0.3)]">
                            <line ref={clipLineRef} x1="55%" y1="0" x2="35%" y2="100%" stroke="#00ff66" strokeWidth="4" />
                        </svg>
                    </div>
                  </header>

                  {/* ==================== 02. ABOUT / TIMEZONE (带强制吸附) ==================== */}
                  <section className="relative w-full min-h-screen flex flex-col justify-center py-24 md:py-40 z-10 overflow-hidden">
                    <div className="absolute inset-0 bg-[#050505]/80 z-0 border-t border-[#111]"></div> 
                    
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300vw] pointer-events-none opacity-[0.03] z-0 flex justify-center">
                      <h2 
                        ref={bgTextRef}
                        className="text-[40vw] md:text-[30vw] leading-none whitespace-nowrap text-white font-display tracking-tighter ease-out transform-gpu"
                      >
                        SYNCING &nbsp; SYNCING &nbsp; SYNCING &nbsp; SYNCING &nbsp; SYNCING
                      </h2>
                    </div>

                    <div className="relative z-10 max-w-[100rem] mx-auto px-6 w-full">
                      <div className="flex flex-col lg:flex-row gap-12 lg:gap-32">
                        <div className="w-full lg:w-5/12 py-4" ref={aboutTitleRef}>
                          <h3 className={`text-[4rem] md:text-[6rem] lg:text-[8rem] uppercase text-white leading-[0.9] tracking-tighter font-display transition-all duration-[1000ms] ease-[cubic-bezier(0.16,1,0.3,1)] ${aboutTitleInView ? 'opacity-100 translate-x-0' : 'opacity-0 -translate-x-32'}`}>
                            ONLINE <br/><span className="text-transparent" style={{ WebkitTextStroke: '2px #00ff66' }}>ROUTINE.</span><br/>UTC SYNC.
                          </h3>
                          <div className={`mt-8 w-16 h-1 bg-[#00ff66] transition-all duration-1000 delay-300 ${aboutTitleInView ? 'opacity-100' : 'opacity-0'}`}></div>
                        </div>
                        
                        <div ref={aboutParallaxRef} className="w-full lg:w-7/12 flex flex-col justify-end pb-4 space-y-8" style={{ willChange: 'transform' }}>
                          <p className="text-base md:text-xl text-gray-300 leading-loose tracking-wide font-light max-w-2xl">
                            我是一名学生，主攻平面设计与创意开发。在这里，没有太多宏大的商业宣言。工作之外，我是一名绝对的 OTAKU，沉浸于各类游戏世界之中。生活与设计的灵感，往往就在这些纯粹的娱乐与创作边界交织处发生。
                          </p>
                          
                          <div className="flex flex-col md:flex-row gap-8 max-w-2xl my-4 py-6 border-t border-[#333]/40">
                              <div className="flex flex-col gap-2">
                                  <span className="text-[#00ff66] text-[10px] md:text-xs font-mono tracking-widest opacity-80">UTC-8 ACTIVE</span>
                                  <span className="text-white text-lg md:text-xl font-bold font-mono tracking-wider">17:00 - 00:00</span>
                              </div>
                              <div className="flex flex-col gap-2">
                                  <span className="text-[#00ff66] text-[10px] md:text-xs font-mono tracking-widest opacity-80">UTC+8 ACTIVE</span>
                                  <span className="text-white text-lg md:text-xl font-bold font-mono tracking-wider">09:00 - 16:00</span>
                              </div>
                          </div>

                          <div className="pt-2">
                            <p className="text-sm md:text-base text-gray-400 leading-relaxed tracking-wide font-light max-w-2xl">
                              如果你想找我聊聊项目、探讨设计，或者单纯想拉上我联机打游戏，只要没在睡觉或上课，我通常都在赛博空间。
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </section>

                  {/* ==================== 03. FAVORITES & INTERESTS (带强制吸附，海报数量翻倍) ==================== */}
                  <section className="relative w-full min-h-screen py-24 md:py-40 z-10 overflow-hidden flex items-center border-t border-[#111]">
                    
                    {/* 动态斜向环形无限滚动海报墙 */}
                    <div 
                        ref={hobbyParallaxRef}
                        className="absolute inset-0 z-0 pointer-events-none mix-blend-screen opacity-[0.35] overflow-hidden transform-gpu" 
                        style={{ willChange: 'transform' }}
                    >
                        <div className="absolute top-1/2 left-1/2 w-[140vw] h-[140vh] -translate-x-1/2 -translate-y-1/2 -rotate-[15deg] scale-110 flex flex-col gap-3 justify-center grayscale-[40%]">
                            <div className="animate-marquee gap-3">
                                {[...gameImages, ...gameImages].map((img, i) => (
                                    <div key={i} className="w-[40vw] md:w-[15vw] aspect-[3/4] flex-shrink-0 bg-cover bg-center rounded-sm bg-[#111]" style={{ backgroundImage: `url(${img})` }}></div>
                                ))}
                            </div>
                            <div className="animate-marquee-reverse gap-3">
                                {[...animeImages, ...animeImages].map((img, i) => (
                                    <div key={i} className="w-[40vw] md:w-[15vw] aspect-[3/4] flex-shrink-0 bg-cover bg-center rounded-sm bg-[#111]" style={{ backgroundImage: `url(${img})` }}></div>
                                ))}
                            </div>
                            <div className="animate-marquee gap-3">
                                {[...gameImages, ...gameImages].map((img, i) => (
                                    <div key={i} className="w-[40vw] md:w-[15vw] aspect-[3/4] flex-shrink-0 bg-cover bg-center rounded-sm bg-[#111]" style={{ backgroundImage: `url(${img})` }}></div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/60 to-[#050505] z-0 pointer-events-none"></div>

                    <div className="relative z-10 max-w-[100rem] mx-auto px-6 w-full" ref={hobbyTitleRef}>
                        <div className="flex flex-col md:flex-row items-start md:items-center gap-12 lg:gap-24">
                            <div className="w-full md:w-4/12">
                                <h2 className={`text-[#00ff66] tracking-[0.4em] text-xs md:text-sm font-bold font-mono opacity-80 mb-6 transition-all duration-700 ${hobbyTitleInView ? 'translate-y-0 opacity-100' : 'translate-y-8 opacity-0'}`}>
                                    /// HOBBIES & INTERESTS
                                </h2>
                                <h3 className={`text-[4rem] md:text-[6rem] lg:text-[7.5rem] uppercase text-white leading-[0.9] tracking-tighter font-display transition-all duration-1000 delay-100 ${hobbyTitleInView ? 'translate-y-0 opacity-100' : 'translate-y-12 opacity-0'}`}>
                                    GAMES & <br/> <span className="text-transparent" style={{ WebkitTextStroke: '2px #00ff66' }}>ANIME.</span>
                                </h3>
                            </div>
                            <div className={`w-full md:w-8/12 border-l-[3px] border-[#00ff66] pl-6 md:pl-12 transition-all duration-1000 delay-300 ${hobbyTitleInView ? 'translate-x-0 opacity-100' : 'translate-x-12 opacity-0'}`}>
                                <p className="text-base md:text-xl text-gray-200 leading-loose tracking-wide font-light">
                                    平时大部分时间都活跃在各类游戏与番剧的平行世界中。对我而言，这些不仅是简单的消遣，更是维持创造力、审美直觉以及保持热爱的最佳方式。
                                </p>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 md:gap-12 mt-10 pt-8 border-t border-[#333]/50">
                                    <div>
                                        <h4 className="text-[#00ff66] text-xs font-mono mb-4 tracking-widest opacity-80">{">>"} CURRENTLY PLAYING / 游戏</h4>
                                        <ul className="space-y-3 font-mono text-sm tracking-wider text-white">
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> APEX LEGENDS</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> VALORANT</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> MINECRAFT</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> OVERWATCH</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> ARKNIGHTS</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="text-[#00ff66] text-xs font-mono mb-4 tracking-widest opacity-80">{">>"} MANGA &amp; ANIME / 番剧与漫画</h4>
                                        <ul className="space-y-3 font-mono text-sm tracking-wider text-white">
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> 契约之吻</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> 无职转生</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> 颂乐人偶</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> 金牌得主</li>
                                            <li className="flex items-center gap-3"><span className="text-[#333]">-</span> 堀与宫村</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                  </section>

                  {/* ==================== 04. PROJECTS (解除 snap-section) ==================== */}
                  <section className="relative w-full min-h-screen py-24 md:py-40 z-20 bg-[#020202]">
                    <div className="max-w-[100rem] mx-auto px-6 w-full">
                      <div className="overflow-hidden mb-24 md:mb-32 pb-8 border-b border-[#111]">
                          <h2 ref={devTitleRef} className={`text-[#00ff66] tracking-[0.4em] text-xs md:text-sm font-bold font-mono transition-all duration-[800ms] ease-out ${devTitleInView ? 'opacity-80 translate-x-0' : 'opacity-0 -translate-x-16'}`}>
                              /// 01. DEVELOPMENT WORKS
                          </h2>
                      </div>

                      <div className="flex flex-col gap-16 md:gap-32 w-full">
                        {/* 全部更新为带有完整域名的绝对路径格式 */}
                        <MonumentalLink scrollY={scrollY} title="C. FORGE" subtitle={{ label: "lavro.org/CForge", desc: "CharacterForge - 角色构建与数据核心逻辑" }} link="https://lavro.org/CForge" index={0} color="white" align="left" iconName="fa-solid fa-code" />
                        <MonumentalLink scrollY={scrollY} title="LIFE SIM." subtitle={{ label: "lavro.org/LSimulator", desc: "Life Simulator - 游戏机制设计与数值模拟系统" }} link="https://lavro.org/LSimulator" index={1} color="green" align="right" iconName="fa-solid fa-gamepad" />
                      </div>
                    </div>
                  </section>

                  {/* PROJECTS: DESIGN */}
                  <section className="relative w-full min-h-screen py-24 md:py-40 z-20 border-t border-[#111]">
                    <div className="absolute inset-0 bg-[#050505]/95 z-0"></div>
                    <div className="relative z-10 max-w-[100rem] mx-auto px-6 w-full">
                      <div className="overflow-hidden mb-24 md:mb-32 pb-8 border-b border-[#222]">
                          <h2 ref={designTitleRef} className={`text-white tracking-[0.4em] text-xs md:text-sm font-bold font-mono transition-all duration-[800ms] ease-out ${designTitleInView ? 'opacity-80 translate-x-0' : 'opacity-0 -translate-x-16'}`}>
                              /// 02. DESIGN AESTHETICS
                          </h2>
                      </div>

                      <div className="flex flex-col gap-16 md:gap-32">
                        <MonumentalLink 
                          scrollY={scrollY}
                          title="D&D ARCHIVES" 
                          subtitle={{ label: "Dungeons & Dragons", desc: "D&D角色设计网页展示及视觉包装实践" }}
                          link={null} 
                          index={2}
                          color="white"
                          align="center"
                          iconName="fa-solid fa-dragon"
                          subLinks={[
                              { name: "ALBERINA", url: "https://lavro.org/DnD/Alberina" },
                              { name: "FLAVILAR", url: "https://lavro.org/DnD/Flavilar" }
                          ]}
                        />
                      </div>
                    </div>
                  </section>

                  {/* CONTACT NETWORK */}
                  <section id="contact-section" className="relative w-full py-24 md:py-40 z-10 bg-[#000]">
                    <div className="relative z-10 max-w-[100rem] mx-auto px-6 w-full">
                      <div className="overflow-hidden mb-20 md:mb-32 pb-6 md:pb-8 border-b border-[#111]">
                          <h2 ref={contactTitleRef} className={`text-[#00ff66] tracking-[0.4em] text-xs md:text-sm font-bold font-mono transition-all duration-[800ms] ease-out ${contactTitleInView ? 'opacity-80 translate-x-0' : 'opacity-0 -translate-x-16'}`}>
                              /// 03. CONTACT NETWORK
                          </h2>
                      </div>

                      <div className="flex flex-col gap-12 md:gap-24 relative z-10">
                        <MonumentalLink scrollY={scrollY} title="EMAIL" subtitle={{ label: "Lavro@lavro.org", desc: "主线联系方式，处理重要事务与项目" }} link="mailto:Lavro@lavro.org" index={4} align="left" iconName="fa-solid fa-envelope" />
                        <MonumentalLink scrollY={scrollY} title="GITHUB" subtitle={{ label: "Lavr0v0", desc: "代码的骨架与开源记录，底层逻辑存放处" }} link="https://github.com/Lavr0v0" index={5} align="right" iconName="fa-brands fa-github" />
                        <MonumentalLink scrollY={scrollY} title="DISCORD" subtitle={{ label: "lavro_", desc: "日常吹水、组排上分，或者赛博空间的快速召唤" }} copyText="lavro_" index={6} color="green" align="left" iconName="fa-brands fa-discord" />
                        <MonumentalLink scrollY={scrollY} title="QQ" subtitle={{ label: "1041022220", desc: "国内常用即时通讯" }} copyText="1041022220" index={7} align="right" iconName="fa-brands fa-qq" />
                        <MonumentalLink scrollY={scrollY} title="STEAM" subtitle={{ label: "Profile", desc: "游戏库与联机状态，来打派派或者瓦！" }} link="https://steamcommunity.com/profiles/76561199125299095/" index={8} color="green" align="left" iconName="fa-brands fa-steam" />
                      </div>
                    </div>
                  </section>

                  <section className="relative w-full bg-black z-20 pb-24 pt-12 border-t border-[#111]">
                      <footer className="pt-8 text-center font-mono text-xs text-gray-600">
                        LAVRO.ORG © {new Date().getFullYear()} // STAY ONLINE.
                      </footer>
                  </section>
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LavroPortfolio />);
    </script>
</body>
</html>
